# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Claude"

ai_usage_summary: |
  Used Gemini and Claude as pair-programming assistants to architect the three-stage
  cascade pipeline, debug Python compatibility issues (Windows cp1252 encoding),
  and iterate on scoring weights. No candidate data was ever sent to any hosted LLM.
  All ranking inference runs locally via a downloaded HuggingFace Cross-Encoder model.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-stage cascade ranker. Stage 1: N-gram TF-IDF (ngram_range 1-3) with JD
  synonym injection to pull 3000 candidates from 100K. Stage 2: Boolean trap
  filter removes honeypots (impossible skill durations, YOE mismatches). 
  Stage 3: Local 12-layer Cross-Encoder (ms-marco-MiniLM-L-12-v2) scores the top 
  800 candidates against the full unstructured JD text (allowing natural penalty 
  of JD disqualifiers). Then blends AI score (40%) with experience band (20%), TF-IDF
  (15%), core skill depth (15%), and behavioral signals (10% - penalizes inactive users, 
  rewards high GitHub scores/interview completion). Reasoning is generated via a 
  deterministic fact-extraction engine using profile data. Total runtime ~3 minutes 
  on CPU. No external API calls, no GPU.

